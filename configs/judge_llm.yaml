# provider: qwen
provider: deepseek

# Optional overrides. If omitted, provider preset is used.
# base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
# model: qwen-plus
# api_key_env: DASHSCOPE_API_KEY

model_a_name: base
model_b_name: peft

input_a: data/sft_eval/outputs_base.jsonl
input_b: data/sft_eval/outputs_peft.jsonl
output_file: data/sft_eval/judge_pairwise.jsonl
summary_file: data/sft_eval/judge_summary.csv

id_field: id
prompt_field: prompt
response_field: generated

run_bi_order: true
# limit: 200

temperature: 0.0
max_tokens: 512
timeout_sec: 120
num_workers: 8
max_retries: 2
retry_backoff_sec: 1.0

# system_prompt: |
#   You are a strict impartial LLM judge...
